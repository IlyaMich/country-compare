metrics:
  gdp_per_capita:
    display_name: GDP per capita
    category: economy
    higher_is_better: true
    default_weight: 1.0
    description: Annual GDP per capita in USD for the golden demo dataset.
    unit: USD
    source: Golden demo dataset
    normalization_method: minmax

  life_expectancy:
    display_name: Life expectancy
    category: health
    higher_is_better: true
    default_weight: 1.0
    description: Life expectancy in years for the golden demo dataset.
    unit: years
    source: Golden demo dataset
    normalization_method: minmax

  unemployment_pct:
    display_name: Unemployment rate
    category: economy
    higher_is_better: false
    default_weight: 1.0
    description: Unemployment rate percentage for the golden demo dataset.
    unit: percent
    source: Golden demo dataset
    normalization_method: minmax

  governance_score:
    display_name: Governance score
    category: governance
    higher_is_better: true
    default_weight: 1.0
    description: Synthetic governance score from 0 to 100 for the golden demo dataset.
    unit: score_0_100
    source: Golden demo dataset
    normalization_method: minmax