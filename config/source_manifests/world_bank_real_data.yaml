name: world_bank_real_data
raw_root: data/raw

processing:
  publish: true
  write_audit_artifacts: true
  output_dir: data/audit/world_bank_real_data

defaults:
  adapter_id: world_bank_indicator_csv
  source_name: World Bank
  source_url: https://data.worldbank.org/
  filter_to_allowed_country_codes: true
  read_options:
    skiprows: 4

sources:
  - source_id: wb_compensation_employees_lcu
    path: compensation_employees_lcu/wb_compensation_employees_lcu.csv
    metric_id: compensation_employees_lcu
    metric_name: Compensation Employees LCU
    expected_indicator_code: GC.XPN.COMP.CN
    unit: LCU
    category: fiscal
    higher_is_better: false # TODO_REVIEW_DIRECTION
    read_options:
      skiprows: 4

  - source_id: wb_taxes_goods_services_lcu
    path: taxes_goods_services_lcu/wb_taxes_goods_services_lcu.csv
    metric_id: taxes_goods_services_lcu
    metric_name: Taxes Goods Services LCU
    expected_indicator_code: GC.TAX.GSRV.CN
    unit: LCU
    category: fiscal
    higher_is_better: false # TODO_REVIEW_DIRECTION
    read_options:
      skiprows: 4

  - source_id: wb_external_debt_total
    path: external_debt_total/wb_external_debt_total.csv
    metric_id: external_debt_total
    metric_name: External Debt Total
    expected_indicator_code: DT.DOD.DECT.CD
    unit: USD
    category: finance
    higher_is_better: false
    read_options:
      skiprows: 4

  - source_id: wb_journal_articles
    path: journal_articles/wb_journal_articles.csv
    metric_id: journal_articles
    metric_name: Journal Articles
    expected_indicator_code: IP.JRN.ARTC.SC
    unit: count
    category: innovation
    higher_is_better: true
    read_options:
      skiprows: 4

  - source_id: wb_rnd_expenditure_pct_gdp
