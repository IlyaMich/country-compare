    metric_name: R&D Expenditure Pct GDP
    expected_indicator_code: GB.XPD.RSDV.GD.ZS
    unit: percent
    category: innovation
    higher_is_better: true
    read_options:
      skiprows: 4

  - source_id: wb_internet_users_pct
