default_profile: balanced_demo
weight_handling: normalize
default_year_strategy: common_year
default_missing_data_policy: renormalize_weights

profiles:
  balanced_demo:
    description: Balanced demo profile across economy, health, employment, and governance.
    metrics:
      - gdp_per_capita
      - life_expectancy
      - unemployment_pct
      - governance_score
    weights:
      gdp_per_capita: 0.30
      life_expectancy: 0.25
      unemployment_pct: 0.20
      governance_score: 0.25
    normalization_overrides: {}
    year_strategy: common_year
    missing_data_policy: renormalize_weights

  economy_demo:
    description: Demo profile focused on economic strength and labor market performance.
    metrics:
      - gdp_per_capita
      - unemployment_pct
    weights:
      gdp_per_capita: 0.65
      unemployment_pct: 0.35
    normalization_overrides: {}
    year_strategy: common_year
    missing_data_policy: renormalize_weights

  governance_quality_demo:
    description: Demo profile focused on governance and quality-of-life signals.
    metrics:
      - governance_score
      - life_expectancy
    weights:
      governance_score: 0.60
      life_expectancy: 0.40
    normalization_overrides: {}
    year_strategy: common_year
    missing_data_policy: renormalize_weights