name: Deploy LLM Forecast Service

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Published GHCR image tag to deploy, for example latest, main, v0.1.0, or sha-abc123def456."
        required: true
        default: latest
      target_environment:
        description: "GitHub environment name for deployment approvals and secrets."
        required: true
        default: beta
      deploy_provider:
        description: "Deployment provider mode. Use render for Render deploy hooks with imgURL support."
        required: true
        default: render
        type: choice
        options:
          - render
          - generic_webhook
      run_smoke_test:
        description: "Run post-deploy smoke checks against COUNTRY_COMPARE_LLM_SERVICE_BASE_URL."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy LLM forecast service image
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_environment }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve deployment image
        id: image
        shell: bash
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/country-compare-llm-forecast:${{ inputs.image_tag }}"

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "Deploying ${image} to ${{ inputs.target_environment }} via ${{ inputs.deploy_provider }}."

      - name: Trigger deployment webhook
        env:
          DEPLOY_PROVIDER: ${{ inputs.deploy_provider }}
          DEPLOY_WEBHOOK_URL: ${{ secrets.COUNTRY_COMPARE_LLM_DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.COUNTRY_COMPARE_LLM_DEPLOY_WEBHOOK_TOKEN }}
          DEPLOY_IMAGE: ${{ steps.image.outputs.image }}
          DEPLOY_ENVIRONMENT: ${{ inputs.target_environment }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_WEBHOOK_URL}" ]; then
            cat >&2 <<'EOF'
          COUNTRY_COMPARE_LLM_DEPLOY_WEBHOOK_URL is not configured for this environment.

          For Render, set it to the LLM forecast service deploy hook URL from the Render service settings.
          For generic_webhook, set it to a webhook endpoint that accepts the JSON payload below.
          EOF
            exit 1
          fi

          if [ "${DEPLOY_PROVIDER}" = "render" ]; then
            render_url=$(python - <<'PY'
          import os
          from urllib.parse import quote

          hook_url = os.environ["DEPLOY_WEBHOOK_URL"]
          image = os.environ["DEPLOY_IMAGE"]
          separator = "&" if "?" in hook_url else "?"
          print(f"{hook_url}{separator}imgURL={quote(image, safe='')}")
          PY
          )

            echo "Triggering Render deploy for ${DEPLOY_IMAGE}."
            curl --fail --show-error --silent --request POST "${render_url}"
            exit 0
          fi

          if [ "${DEPLOY_PROVIDER}" = "generic_webhook" ]; then
            payload=$(python - <<'PY'
          import json
          import os

          print(json.dumps({
              "image": os.environ["DEPLOY_IMAGE"],
              "environment": os.environ["DEPLOY_ENVIRONMENT"],
              "service": "country-compare-llm-forecast",
          }))
          PY
          )

            echo "Triggering generic deployment webhook for ${DEPLOY_IMAGE}."

            if [ -n "${DEPLOY_WEBHOOK_TOKEN}" ]; then
              curl --fail --show-error --silent \
                --request POST \
                --header "Content-Type: application/json" \
                --header "Authorization: Bearer ${DEPLOY_WEBHOOK_TOKEN}" \
                --data "${payload}" \
                "${DEPLOY_WEBHOOK_URL}"
            else
              curl --fail --show-error --silent \
                --request POST \
                --header "Content-Type: application/json" \
                --data "${payload}" \
                "${DEPLOY_WEBHOOK_URL}"
            fi

            exit 0
          fi

          echo "Unsupported deploy_provider: ${DEPLOY_PROVIDER}" >&2
          exit 1

      - name: Run post-deploy LLM forecast service smoke checks
        if: ${{ inputs.run_smoke_test == 'true' }}
        env:
          LLM_BASE_URL: ${{ secrets.COUNTRY_COMPARE_LLM_SERVICE_BASE_URL }}
          LLM_SERVICE_TOKEN: ${{ secrets.COUNTRY_COMPARE_LLM_SERVICE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${LLM_BASE_URL}" ]; then
            cat >&2 <<'EOF'
          COUNTRY_COMPARE_LLM_SERVICE_BASE_URL is not configured for this environment.

          Set it to the LLM service URL reachable by this workflow. Prefer a private/internal
          service URL or protected ingress when your deployment platform supports it.
          EOF
            exit 1
          fi

          if [ -z "${LLM_SERVICE_TOKEN}" ]; then
            cat >&2 <<'EOF'
          COUNTRY_COMPARE_LLM_SERVICE_TOKEN is not configured for this environment.

          Set it to the same value as the deployed LLM_SERVICE_TOKEN environment variable.
          EOF
            exit 1
          fi

          base_url="${LLM_BASE_URL%/}"

          echo "Waiting for LLM forecast service health at ${base_url}/health"

          for attempt in $(seq 1 70); do
            if curl --fail --silent --show-error --max-time 10 "${base_url}/health"; then
              echo
              echo "LLM forecast service health check passed."
              break
            fi

            if [ "${attempt}" -eq 70 ]; then
              echo "LLM forecast service did not become healthy in time." >&2
              exit 1
            fi

            sleep 6
          done

          echo "Waiting for unauthenticated LLM forecast service readiness at ${base_url}/ready"

          for attempt in $(seq 1 70); do
            ready_status="$(
              curl \
                --silent \
                --show-error \
                --max-time 15 \
                --output /tmp/llm-ready-response.json \
                --write-out "%{http_code}" \
                "${base_url}/ready" || true
            )"

            if [ "${ready_status}" = "200" ]; then
              cat /tmp/llm-ready-response.json
              echo
              echo "LLM forecast service readiness check passed."
              break
            fi

            echo "Readiness attempt ${attempt}/70 returned HTTP ${ready_status}."
            cat /tmp/llm-ready-response.json || true
            echo

            if [ "${attempt}" -eq 70 ]; then
              echo "LLM forecast service did not become ready in time." >&2

              echo "Authenticated readiness details for debugging:"
              curl --silent --show-error --max-time 15 \
                --header "Authorization: Bearer ${LLM_SERVICE_TOKEN}" \
                "${base_url}/ready" || true
              echo

              exit 1
            fi

            sleep 6
          done

          echo "Verifying unauthenticated /ready hides protected details."
          ready_payload="$(cat /tmp/llm-ready-response.json)"
          if echo "${ready_payload}" | grep -q '"provider"'; then
            echo "Expected unauthenticated /ready to hide provider details." >&2
            exit 1
          fi
          if echo "${ready_payload}" | grep -q '"issues"'; then
            echo "Expected unauthenticated /ready to hide readiness issue details." >&2
            exit 1
          fi

          echo "Checking authenticated readiness details."
          authenticated_ready_status="$(
            curl \
              --silent \
              --show-error \
              --max-time 15 \
              --header "Authorization: Bearer ${LLM_SERVICE_TOKEN}" \
              --output /tmp/llm-ready-authenticated-response.json \
              --write-out "%{http_code}" \
              "${base_url}/ready"
          )"

          if [ "${authenticated_ready_status}" != "200" ]; then
            echo "Authenticated /ready returned HTTP ${authenticated_ready_status}." >&2
            cat /tmp/llm-ready-authenticated-response.json >&2 || true
            exit 1
          fi

          cat /tmp/llm-ready-authenticated-response.json
          echo

          if ! grep -q '"provider"' /tmp/llm-ready-authenticated-response.json; then
            echo "Expected authenticated /ready to include provider details." >&2
            exit 1
          fi

          echo "Checking authenticated capabilities endpoint."
          curl --fail --silent --show-error --max-time 15 \
            --header "Authorization: Bearer ${LLM_SERVICE_TOKEN}" \
            "${base_url}/v1/capabilities"
          echo

          echo "Checking unauthenticated /metrics is protected."
          metrics_status="$(
            curl \
              --silent \
              --show-error \
              --max-time 15 \
              --output /tmp/llm-metrics-unauthenticated.txt \
              --write-out "%{http_code}" \
              "${base_url}/metrics" || true
          )"

          if [ "${metrics_status}" = "200" ]; then
            echo "Expected unauthenticated /metrics to be rejected." >&2
            cat /tmp/llm-metrics-unauthenticated.txt >&2 || true
            exit 1
          fi

          echo "Checking authenticated /metrics endpoint."
          curl --fail --silent --show-error --max-time 15 \
            --header "Authorization: Bearer ${LLM_SERVICE_TOKEN}" \
            "${base_url}/metrics" \
            --output /tmp/llm-metrics-authenticated.txt

          if ! grep -q "llm_http_requests_total" /tmp/llm-metrics-authenticated.txt; then
            echo "Expected authenticated /metrics to expose HTTP metrics." >&2
            cat /tmp/llm-metrics-authenticated.txt >&2 || true
            exit 1
          fi

          echo "Checking OpenAPI/docs are disabled."
          openapi_status="$(
            curl \
              --silent \
              --show-error \
              --max-time 15 \
              --output /tmp/llm-openapi-response.txt \
              --write-out "%{http_code}" \
              "${base_url}/openapi.json" || true
          )"

          if [ "${openapi_status}" = "200" ]; then
            echo "Expected /openapi.json to be disabled in deployment." >&2
            cat /tmp/llm-openapi-response.txt >&2 || true
            exit 1
          fi

          echo "LLM forecast service post-deploy smoke checks passed."