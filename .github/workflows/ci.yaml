name: CI

on:
  workflow_dispatch:
    inputs:
      image_target:
        description: "Image target for manual runs."
        required: true
        default: all
        type: choice
        options:
          - all
          - backend
          - llm
      publish_images:
        description: "Publish selected image(s) to GHCR. Allowed only from main, develop, or v* tags."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - develop
      - main
      - "feature/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read

jobs:
  python-quality:
    name: Python quality checks
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.image_target == 'all' || inputs.image_target == 'backend'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev, ml]"

      - name: Build processed dataset artifacts
        run: |
          python scripts/update_parquet_data_wb.py --skip-audit
          test -s data/processed/metrics.parquet
          test -s data/processed/metrics_manifest.json
          test -s data/processed/catalog.json

      - name: Run static layout guards
        run: |
          python scripts/check_static_guards.py

      - name: Check formatting
        run: |
          python -m black --check src/country_compare tests scripts

      - name: Run ruff
        run: |
          python -m ruff check src/country_compare tests scripts

      - name: Run mypy
        run: |
          python -m mypy src/country_compare

      - name: Run tests
        run: |
          python -m pytest

  package-build:
    name: Build and install package artifacts
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.image_target == 'all' || inputs.image_target == 'backend'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install built wheel with UI extra
        run: |
          python -m venv /tmp/country-compare-ui-wheel-env
          /tmp/country-compare-ui-wheel-env/bin/python -m pip install --upgrade pip
          /tmp/country-compare-ui-wheel-env/bin/python - <<'PY'
          from pathlib import Path
          import importlib
          import importlib.util
          import subprocess
          import sys

          wheels = sorted(Path("dist").glob("country_compare-*.whl"))
          if not wheels:
              raise SystemExit("No built wheel found.")

          wheel = wheels[0]
          subprocess.check_call(
              [sys.executable, "-m", "pip", "install", f"{wheel}[ui]"]
          )

          bootstrap = importlib.import_module("country_compare.ui.bootstrap")
          assert hasattr(bootstrap, "build_app_context")
          assert hasattr(bootstrap, "get_ui_services")
          assert hasattr(bootstrap, "bootstrap_app")
          assert importlib.util.find_spec("streamlit") is not None
          assert importlib.util.find_spec("httpx") is not None
          assert importlib.util.find_spec("matplotlib") is not None
          print("UI extra wheel install passed.")
          PY

      - name: Install built sdist with dev extra
        run: |
          python -m venv /tmp/country-compare-sdist-env
          /tmp/country-compare-sdist-env/bin/python -m pip install --upgrade pip
          /tmp/country-compare-sdist-env/bin/python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          sdists = sorted(Path("dist").glob("country_compare-*.tar.gz"))
          if not sdists:
              raise SystemExit("No built sdist found.")

          subprocess.check_call(
              [sys.executable, "-m", "pip", "install", f"{sdists[0]}[dev]"]
          )

          import country_compare

          print(country_compare.__version__)
          PY

  dependency-security:
    name: Dependency security scan
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.image_target == 'all' || inputs.image_target == 'backend'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Run pip-audit in non-blocking mode
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip_audit || true

  docker-build:
    name: Docker build, smoke, and release image
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.image_target == 'all' || inputs.image_target == 'backend'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python for fixture data and smoke checks
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build processed release dataset
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .
          python scripts/update_parquet_data_wb.py --skip-audit
          test -f data/processed/metrics.parquet
          test -f data/processed/metrics_manifest.json
          test -f data/processed/catalog.json
          country-compare validate-data
          country-compare validate-config

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build default Compose services
        run: |
          docker compose build

      - name: Smoke test default Compose backend
        run: |
          docker compose up -d backend
          python scripts/smoke_api_container.py --base-url http://127.0.0.1:8000

      - name: Show default Compose backend logs on failure
        if: failure()
        run: |
          docker compose logs backend

      - name: Stop default Compose services
        if: always()
        run: |
          docker compose down --volumes --remove-orphans

      - name: Build backend-only Compose service
        env:
          COUNTRY_COMPARE_API_KEY: ci-smoke-key
          COUNTRY_COMPARE_API_PORT: "8000"
          PORT: "8000"
        run: |
          docker compose -f compose.api.yml build backend

      - name: Smoke test backend-only Compose service
        env:
          COUNTRY_COMPARE_API_ENV: production
          COUNTRY_COMPARE_API_AUTH_REQUIRED: "true"
          COUNTRY_COMPARE_API_KEY: ci-smoke-key
          COUNTRY_COMPARE_API_ENABLE_DOCS: "false"
          COUNTRY_COMPARE_API_PROTECT_DOCS: "true"
          COUNTRY_COMPARE_API_ENABLE_METRICS: "true"
          COUNTRY_COMPARE_API_PROTECT_METRICS: "true"
          COUNTRY_COMPARE_API_PORT: "8000"
          PORT: "8000"
          COUNTRY_COMPARE_ENABLE_LLM_FORECAST: "false"
          COUNTRY_COMPARE_LLM_SERVICE_URL: http://llm-forecast:8080
          COUNTRY_COMPARE_LLM_SERVICE_TOKEN: ""
          COUNTRY_COMPARE_LLM_SERVICE_TIMEOUT_SECONDS: "75"
        run: |
          set -euo pipefail

          trap '
            echo "::group::backend-only compose ps"
            docker compose -f compose.api.yml ps -a || true
            echo "::endgroup::"
            echo "::group::backend-only compose logs"
            docker compose -f compose.api.yml logs --no-color backend || true
            echo "::endgroup::"
          ' ERR

          docker compose -f compose.api.yml up -d backend
          docker compose -f compose.api.yml ps -a
          python scripts/smoke_api_container.py \
            --base-url http://127.0.0.1:8000 \
            --api-key ci-smoke-key \
            --wait-seconds 180

      - name: Show backend-only Compose logs on failure
        if: failure()
        env:
          COUNTRY_COMPARE_API_KEY: ci-smoke-key
          COUNTRY_COMPARE_API_PORT: "8000"
          PORT: "8000"
        run: |
          docker compose -f compose.api.yml ps -a || true
          docker compose -f compose.api.yml logs --no-color backend || true

      - name: Stop backend-only Compose services
        if: always()
        env:
          COUNTRY_COMPARE_API_KEY: ci-smoke-key
          COUNTRY_COMPARE_API_PORT: "8000"
          PORT: "8000"
        run: |
          docker compose -f compose.api.yml down --volumes --remove-orphans

      - name: Build release candidate backend image with embedded dataset
        run: |
          docker build \
            --file Dockerfile.backend \
            --tag country-compare-backend:ci \
            .

      - name: Smoke test release candidate image without host volumes
        run: |
          docker run -d \
            --name country-compare-backend-ci \
            --publish 8001:8000 \
            --env COUNTRY_COMPARE_API_ENV=production \
            --env COUNTRY_COMPARE_API_AUTH_REQUIRED=true \
            --env COUNTRY_COMPARE_API_KEY=ci-smoke-key \
            --env COUNTRY_COMPARE_API_ENABLE_DOCS=false \
            --env COUNTRY_COMPARE_API_ENABLE_METRICS=true \
            --env COUNTRY_COMPARE_API_PROTECT_METRICS=true \
            --env COUNTRY_COMPARE_ENABLE_LLM_FORECAST=false \
            country-compare-backend:ci

          python scripts/smoke_api_container.py \
            --base-url http://127.0.0.1:8001 \
            --api-key ci-smoke-key

      - name: Show release candidate backend logs on failure
        if: failure()
        run: |
          docker logs country-compare-backend-ci || true

      - name: Stop release candidate backend
        if: always()
        run: |
          docker rm -f country-compare-backend-ci || true

      - name: Build LLM forecast service image for integration smoke
        if: github.event_name != 'workflow_dispatch' || inputs.image_target == 'all'
        run: |
          docker build \
            --file services/llm_forecast_service/Dockerfile \
            --tag llm-forecast-service:ci \
            .

      - name: Smoke test backend-to-LLM readiness
        if: github.event_name != 'workflow_dispatch' || inputs.image_target == 'all'
        run: |
          set -euo pipefail

          cleanup() {
            status=$?
            if [ "$status" -ne 0 ]; then
              echo "::group::LLM forecast service logs"
              docker logs llm-forecast-service-ci || true
              echo "::endgroup::"

              echo "::group::Backend LLM smoke logs"
              docker logs country-compare-backend-llm-ci || true
              echo "::endgroup::"
            fi

            docker rm -f country-compare-backend-llm-ci llm-forecast-service-ci || true
            docker network rm country-compare-llm-smoke || true
            exit "$status"
          }

          trap cleanup EXIT

          docker network rm country-compare-llm-smoke || true
          docker network create country-compare-llm-smoke

          docker run -d \
            --name llm-forecast-service-ci \
            --network country-compare-llm-smoke \
            --env LLM_PROVIDER=baseline_echo \
            --env LLM_SERVICE_TOKEN=ci-llm-token \
            --env LLM_DEPLOYMENT_PROFILE=local \
            --env LLM_ENABLE_METRICS=true \
            --env LLM_PROTECT_METRICS=true \
            --env LLM_PROTECT_READY_DETAILS=true \
            --env LLM_ENABLE_DOCS=false \
            --env LLM_MAX_CONCURRENT_REQUESTS=1 \
            --env LLM_QUEUE_TIMEOUT_SECONDS=2.0 \
            --env LLM_MAX_RETRIES=0 \
            --env LLM_TIMEOUT_SECONDS=5 \
            --env LLM_LOG_LEVEL=INFO \
            llm-forecast-service:ci

          docker run -d \
            --name country-compare-backend-llm-ci \
            --network country-compare-llm-smoke \
            --publish 8002:8000 \
            --env COUNTRY_COMPARE_API_ENV=production \
            --env COUNTRY_COMPARE_API_AUTH_REQUIRED=true \
            --env COUNTRY_COMPARE_API_KEY=ci-smoke-key \
            --env COUNTRY_COMPARE_API_ENABLE_DOCS=false \
            --env COUNTRY_COMPARE_API_ENABLE_METRICS=true \
            --env COUNTRY_COMPARE_API_PROTECT_METRICS=true \
            --env COUNTRY_COMPARE_ENABLE_LLM_FORECAST=true \
            --env COUNTRY_COMPARE_LLM_SERVICE_URL=http://llm-forecast-service-ci:8080 \
            --env COUNTRY_COMPARE_LLM_SERVICE_TOKEN=ci-llm-token \
            --env COUNTRY_COMPARE_LLM_SERVICE_TIMEOUT_SECONDS=3 \
            country-compare-backend:ci

          python scripts/smoke_api_container.py \
            --base-url http://127.0.0.1:8002 \
            --api-key ci-smoke-key \
            --check-llm-readiness

      - name: Run Trivy backend image scan in non-blocking mode
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: country-compare-backend:ci
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Resolve backend image publish policy
        id: backend_publish_policy
        shell: bash
        env:
          PUBLISH_IMAGES: ${{ inputs.publish_images || 'false' }}
        run: |
          set -euo pipefail

          should_publish=false

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            if [ "${GITHUB_REF}" = "refs/heads/main" ] || [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              should_publish=true
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${PUBLISH_IMAGES}" = "true" ]; then
            if [ "${GITHUB_REF}" = "refs/heads/main" ] || \
               [ "${GITHUB_REF}" = "refs/heads/develop" ] || \
               [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              should_publish=true
            else
              echo "Manual backend image publishing is allowed only from main, develop, or v* tags." >&2
              echo "Current ref: ${GITHUB_REF}" >&2
              exit 1
            fi
          fi

          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"

      - name: Resolve GHCR image name
        id: image
        if: steps.backend_publish_policy.outputs.should_publish == 'true'
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/country-compare-api" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: steps.image.outputs.name != ''
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Publish backend API image to GHCR
        if: steps.image.outputs.name != ''
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          SHORT_SHA: ${{ steps.image.outputs.short_sha }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          tags=("${IMAGE_NAME}:sha-${SHORT_SHA}")

          if [ "${REF_TYPE}" = "branch" ] && [ "${REF_NAME}" = "main" ]; then
            tags+=("${IMAGE_NAME}:main" "${IMAGE_NAME}:latest")
          fi

          if [ "${REF_TYPE}" = "tag" ]; then
            tags+=("${IMAGE_NAME}:${REF_NAME}")
          fi

          for tag in "${tags[@]}"; do
            docker tag country-compare-backend:ci "${tag}"
            docker push "${tag}"
          done

          printf 'Published image tags:\n%s\n' "${tags[@]}"

  llm-forecast-service:
    name: LLM forecast service checks
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.image_target == 'all' || inputs.image_target == 'llm'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/llm_forecast_service/pyproject.toml

      - name: Install LLM forecast service dev dependencies
        run: |
          cd services/llm_forecast_service
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"

      - name: Run LLM forecast service tests
        run: |
          cd services/llm_forecast_service
          python -m pytest

      - name: Check LLM forecast service formatting
        run: |
          cd services/llm_forecast_service
          python -m black --check src tests

      - name: Run LLM forecast service ruff
        run: |
          cd services/llm_forecast_service
          python -m ruff check src tests

      - name: Run LLM forecast service mypy
        run: |
          cd services/llm_forecast_service
          python -m mypy src

      - name: Run LLM forecast service dependency scan in non-blocking mode
        continue-on-error: true
        run: |
          cd services/llm_forecast_service
          python -m pip_audit

      - name: Build LLM forecast service Docker image
        run: |
          docker build \
            --file services/llm_forecast_service/Dockerfile \
            --tag llm-forecast-service:ci \
            .

      - name: Validate LLM Compose profile
        run: |
          docker compose --profile llm config
          docker compose --profile llm build llm-forecast

      - name: Smoke test LLM forecast service Docker image
        run: |
          set -euo pipefail

          docker run -d \
            --name llm-forecast-service-ci \
            --publish 18080:18080 \
            --env PORT=18080 \
            --env LLM_PROVIDER=baseline_echo \
            --env LLM_SERVICE_TOKEN=ci-smoke-token \
            --env LLM_DEPLOYMENT_PROFILE=local \
            --env LLM_MAX_CONCURRENT_REQUESTS=1 \
            --env LLM_QUEUE_TIMEOUT_SECONDS=2.0 \
            --env LLM_ENABLE_METRICS=true \
            --env LLM_PROTECT_METRICS=true \
            --env LLM_PROTECT_READY_DETAILS=true \
            --env LLM_ENABLE_DOCS=false \
            --env LLM_MAX_RETRIES=0 \
            --env LLM_TIMEOUT_SECONDS=5 \
            --env LLM_LOG_LEVEL=INFO \
            llm-forecast-service:ci

          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:18080/health; then
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "LLM forecast service did not become healthy."
              docker logs llm-forecast-service-ci || true
              exit 1
            fi

            sleep 1
          done

          # Unauthenticated /ready should be available but minimal.
          ready_payload="$(curl --fail --silent --show-error http://127.0.0.1:18080/ready)"
          echo "${ready_payload}"
          echo "${ready_payload}" | grep '"status"'
          if echo "${ready_payload}" | grep -q '"provider"'; then
            echo "Expected unauthenticated /ready to hide provider details." >&2
            exit 1
          fi

          # Authenticated capabilities should work.
          curl --fail --silent --show-error \
            --header "Authorization: Bearer ci-smoke-token" \
            http://127.0.0.1:18080/v1/capabilities

          # /metrics should be protected.
          metrics_status="$(
            curl --silent --show-error \
              --output /tmp/llm_metrics_unauth.txt \
              --write-out "%{http_code}" \
              http://127.0.0.1:18080/metrics
          )"
          if [ "${metrics_status}" = "200" ]; then
            echo "Expected unauthenticated /metrics to be rejected." >&2
            cat /tmp/llm_metrics_unauth.txt >&2 || true
            exit 1
          fi

          curl --fail --silent --show-error \
            --header "Authorization: Bearer ci-smoke-token" \
            http://127.0.0.1:18080/metrics

          # Docs/OpenAPI should be disabled in the CI smoke container.
          openapi_status="$(
            curl --silent --show-error \
              --output /tmp/llm_openapi.txt \
              --write-out "%{http_code}" \
              http://127.0.0.1:18080/openapi.json
          )"
          if [ "${openapi_status}" = "200" ]; then
            echo "Expected /openapi.json to be disabled." >&2
            cat /tmp/llm_openapi.txt >&2 || true
            exit 1
          fi

      - name: Show LLM forecast service logs on failure
        if: failure()
        run: |
          docker logs llm-forecast-service-ci || true

      - name: Stop LLM forecast service smoke container
        if: always()
        run: |
          docker rm -f llm-forecast-service-ci || true

      - name: Run Trivy LLM forecast service image scan in non-blocking mode
        continue-on-error: true
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: llm-forecast-service:ci
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Resolve LLM forecast image publish policy
        id: llm_publish_policy
        shell: bash
        env:
          PUBLISH_IMAGES: ${{ inputs.publish_images || 'false' }}
        run: |
          set -euo pipefail

          should_publish=false

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            if [ "${GITHUB_REF}" = "refs/heads/main" ] || [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              should_publish=true
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${PUBLISH_IMAGES}" = "true" ]; then
            if [ "${GITHUB_REF}" = "refs/heads/main" ] || \
               [ "${GITHUB_REF}" = "refs/heads/develop" ] || \
               [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              should_publish=true
            else
              echo "Manual LLM image publishing is allowed only from main, develop, or v* tags." >&2
              echo "Current ref: ${GITHUB_REF}" >&2
              exit 1
            fi
          fi

          echo "should_publish=${should_publish}" >> "$GITHUB_OUTPUT"

      - name: Resolve GHCR LLM forecast image name
        id: llm_image
        if: steps.llm_publish_policy.outputs.should_publish == 'true'
        shell: bash
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/country-compare-llm-forecast" >> "$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR for LLM forecast image
        if: steps.llm_image.outputs.name != ''
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Publish LLM forecast service image to GHCR
        if: steps.llm_image.outputs.name != ''
        env:
          IMAGE_NAME: ${{ steps.llm_image.outputs.name }}
          SHORT_SHA: ${{ steps.llm_image.outputs.short_sha }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail

          tags=("${IMAGE_NAME}:sha-${SHORT_SHA}")

          if [ "${REF_TYPE}" = "branch" ] && [ "${REF_NAME}" = "main" ]; then
            tags+=("${IMAGE_NAME}:main" "${IMAGE_NAME}:latest")
          fi

          if [ "${REF_TYPE}" = "tag" ]; then
            tags+=("${IMAGE_NAME}:${REF_NAME}")
          fi

          for tag in "${tags[@]}"; do
            docker tag llm-forecast-service:ci "${tag}"
            docker push "${tag}"
          done

          printf 'Published LLM forecast image tags:\n%s\n' "${tags[@]}"