name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python quality checks (${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements-dev.txt

      - name: Upgrade packaging tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install package with development dependencies
        run: |
          python -m pip install -e ".[dev]"

      - name: Check formatting
        run: |
          python -m black --check src/country_compare tests scripts

      - name: Run lint checks
        run: |
          python -m ruff check src/country_compare tests scripts

      - name: Run type checks
        run: |
          python -m mypy src/country_compare

      - name: Run tests
        run: |
          python -m pytest

  docker-build:
    name: Docker Compose build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build Compose services
        run: |
          docker compose build