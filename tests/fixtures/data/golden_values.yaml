# Golden values used by data correctness tests.
#
# The example_dataset section is deterministic and should pass on a fresh
# checkout because it is based on country_compare.data.examples.
#
# The release_dataset section is intentionally empty by default. Before tagging
# a release, add trusted source-verified values for your real generated parquet
# and run:
#
#   $env:COUNTRY_COMPARE_DATA_CORRECTNESS_PATH = "data\processed\metrics.parquet"
#   python -m pytest tests\integration\data\test_data_correctness_golden_values.py
#   Remove-Item Env:COUNTRY_COMPARE_DATA_CORRECTNESS_PATH -ErrorAction SilentlyContinue
#
# Rule behavior:
# - country_code + metric_id + year must identify exactly one row.
# - expected_value is checked using tolerance_abs and/or tolerance_pct.
# - unit, category, higher_is_better are optional exact checks.
# - source_name_contains and source_url_contains are optional contains checks.

example_dataset:
  golden_values:
    - country_code: ISR
      metric_id: gdp_per_capita
      year: 2025
      expected_value: 59000.0
      tolerance_abs: 0.001
      unit: USD
      category: economy
      higher_is_better: true
      source_name_contains:
        - Example Source
      source_url_contains:
        - example.org/gdp

    - country_code: DEU
      metric_id: rule_of_law
      year: 2025
      expected_value: 0.86
      tolerance_abs: 0.001
      unit: index
      category: governance
      higher_is_better: true
      source_name_contains:
        - Example Source
      source_url_contains:
        - example.org/rule-of-law

    - country_code: SGP
      metric_id: democracy_index
      year: 2025
      expected_value: 6.4
      tolerance_abs: 0.001
      unit: score_0_10
      category: governance
      higher_is_better: true
      source_name_contains:
        - Example Source
      source_url_contains:
        - example.org/democracy-index

    - country_code: JPN
      metric_id: inflation
      year: 2025
      expected_value: 1.8
      tolerance_abs: 0.001
      unit: percent
      category: economy
      higher_is_better: false
      source_name_contains:
        - Example Source
      source_url_contains:
        - example.org/inflation

    - country_code: CAN
      metric_id: life_expectancy
      year: 2025
      expected_value: 82.7
      tolerance_abs: 0.001
      unit: years
      category: health
      higher_is_better: true
      source_name_contains:
        - Example Source
      source_url_contains:
        - example.org/life-expectancy

