# Source-family expectations for data correctness tests.
#
# These rules are intentionally family-based rather than exact URL-based.
# That makes the tests stable across source URL changes while still catching
# metric/source swaps, missing source metadata, and clearly wrong source families.
#
# The synthetic example dataset uses:
#   source_name: Example Source
#   source_url: https://example.org/...
#
# The real release/configured dataset currently uses mostly:
#   source_name/source: World Bank
#
# Rule behavior expected by the test:
# - source_name_contains: at least one item must appear in source_name
# - source_url_contains: at least one item must appear in source_url
# - unit: optional exact expected unit
# - category: optional exact expected category

defaults:
  source_name_contains:
    - Example Source
    - World Bank
  source_url_contains:
    - example.org
    - worldbank.org
    - api.worldbank.org
    - data.worldbank.org

