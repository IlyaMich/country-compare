# Metric-aware release trend rules.
#
# The goal is to catch suspicious unreviewed changes without warning on every
# low-base percentage metric or nonconsecutive observation gap.

defaults:
  enabled: true
  require_consecutive_years: true
  absolute_threshold: null
  relative_threshold: null
  relative_min_previous_abs: 1.0

metrics:
  # Health and bounded social indicators: use absolute point/year thresholds.
  life_expectancy:
    absolute_threshold: 10.0
    relative_threshold: null

  life_expectancy_female:
    absolute_threshold: 10.0
    relative_threshold: null

  life_expectancy_male:
    absolute_threshold: 10.0
    relative_threshold: null

  crude_death_rate:
    absolute_threshold: 25.0
    relative_threshold: null

  youth_literacy_pct:
    absolute_threshold: 25.0
    relative_threshold: null

  labor_participation_pct:
    absolute_threshold: 25.0
    relative_threshold: null

  unemployment_pct:
    absolute_threshold: 35.0
    relative_threshold: null

  internet_users_pct:
    absolute_threshold: 40.0
    relative_threshold: null

  education_spending_pct_gdp:
    absolute_threshold: 25.0
    relative_threshold: null

  rnd_expenditure_pct_gdp:
    absolute_threshold: 10.0
    relative_threshold: null

  military_exp_pct_gdp:
    absolute_threshold: 25.0
    relative_threshold: null

  market_cap_pct_gdp:
    absolute_threshold: 500.0
    relative_threshold: null

  top10_income_share:
    absolute_threshold: 25.0
    relative_threshold: null

  population_growth_pct:
    absolute_threshold: 15.0
    relative_threshold: null

  # Index/count/money metrics: relative checks only when the previous value is
  # large enough that percent-change math is meaningful.
  consumer_price_index:
    absolute_threshold: null
    relative_threshold: 3.0
    relative_min_previous_abs: 25.0

  gdp_current_usd:
    absolute_threshold: null
    relative_threshold: 5.0
    relative_min_previous_abs: 100000000.0

  external_debt_total:
    absolute_threshold: null
    relative_threshold: 5.0
    relative_min_previous_abs: 100000000.0

  compensation_employees_lcu:
    absolute_threshold: null
    relative_threshold: 10.0
    relative_min_previous_abs: 1000000.0

  taxes_goods_services_lcu:
    absolute_threshold: null
    relative_threshold: 10.0
    relative_min_previous_abs: 1000000.0

  journal_articles:
    absolute_threshold: null
    relative_threshold: 10.0
    relative_min_previous_abs: 100.0

  # Growth-rate metrics are allowed to be volatile. Hard plausibility/unit tests
  # still catch impossible scale mistakes.
  imports_growth_pct:
    enabled: false

  exports_growth_pct:
    enabled: false

