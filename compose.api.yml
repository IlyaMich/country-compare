services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: country-compare-backend:latest
    environment:
      COUNTRY_COMPARE_API_ENABLE_DOCS: ${COUNTRY_COMPARE_API_ENABLE_DOCS:-false}
      COUNTRY_COMPARE_API_CORS_ORIGINS: ${COUNTRY_COMPARE_API_CORS_ORIGINS:-}
      COUNTRY_COMPARE_API_MAX_RECORDS: ${COUNTRY_COMPARE_API_MAX_RECORDS:-500}
      COUNTRY_COMPARE_API_MAX_COUNTRIES: ${COUNTRY_COMPARE_API_MAX_COUNTRIES:-50}
      COUNTRY_COMPARE_API_MAX_METRICS: ${COUNTRY_COMPARE_API_MAX_METRICS:-50}
      COUNTRY_COMPARE_API_MAX_HORIZON_YEARS: ${COUNTRY_COMPARE_API_MAX_HORIZON_YEARS:-10}
      COUNTRY_COMPARE_API_MAX_HOLDOUT_YEARS: ${COUNTRY_COMPARE_API_MAX_HOLDOUT_YEARS:-10}
      COUNTRY_COMPARE_API_MAX_TOP_N: ${COUNTRY_COMPARE_API_MAX_TOP_N:-100}
      COUNTRY_COMPARE_API_KEY: ${COUNTRY_COMPARE_API_KEY:-}
      COUNTRY_COMPARE_API_LOG_LEVEL: ${COUNTRY_COMPARE_API_LOG_LEVEL:-INFO}
      COUNTRY_COMPARE_STORE_BACKEND: ${COUNTRY_COMPARE_STORE_BACKEND:-parquet}
      PORT: ${PORT:-8000}
      OMP_NUM_THREADS: ${OMP_NUM_THREADS:-1}
      OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-1}
      MKL_NUM_THREADS: ${MKL_NUM_THREADS:-1}
      NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-1}
      COUNTRY_COMPARE_STORE_PATH: ${COUNTRY_COMPARE_STORE_PATH:-/app/data/processed/metrics.parquet}
      COUNTRY_COMPARE_METRICS_CONFIG: ${COUNTRY_COMPARE_METRICS_CONFIG:-/app/config/metrics.yaml}
      COUNTRY_COMPARE_SCORING_CONFIG: ${COUNTRY_COMPARE_SCORING_CONFIG:-/app/config/scoring_profiles.yaml}
      COUNTRY_COMPARE_AUDIT_DIR: ${COUNTRY_COMPARE_AUDIT_DIR:-/app/data/audit}
      COUNTRY_COMPARE_EXPORT_DIR: ${COUNTRY_COMPARE_EXPORT_DIR:-/app/data/exports}
    volumes:
      - ./config:/app/config:ro
      - ./data/processed:/app/data/processed:ro
    ports:
      - "${COUNTRY_COMPARE_API_PORT:-8000}:${PORT:-8000}"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import urllib.request
          import os
          port = os.environ.get('PORT', '8000')
          urllib.request.urlopen(f'http://127.0.0.1:{port}/health', timeout=5).read()
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
