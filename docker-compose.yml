services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: country-compare-backend:latest
    environment:
      PORT: "8000"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
      COUNTRY_COMPARE_API_ENABLE_DOCS: ${COUNTRY_COMPARE_API_ENABLE_DOCS:-true}
      COUNTRY_COMPARE_API_MAX_COUNTRIES: ${COUNTRY_COMPARE_API_MAX_COUNTRIES:-50}
      COUNTRY_COMPARE_API_MAX_METRICS: ${COUNTRY_COMPARE_API_MAX_METRICS:-50}
      COUNTRY_COMPARE_API_MAX_HORIZON_YEARS: ${COUNTRY_COMPARE_API_MAX_HORIZON_YEARS:-10}
      COUNTRY_COMPARE_API_MAX_HOLDOUT_YEARS: ${COUNTRY_COMPARE_API_MAX_HOLDOUT_YEARS:-10}
      COUNTRY_COMPARE_API_MAX_TOP_N: ${COUNTRY_COMPARE_API_MAX_TOP_N:-100}
      COUNTRY_COMPARE_API_KEY: ${COUNTRY_COMPARE_API_KEY:-}
      COUNTRY_COMPARE_API_LOG_LEVEL: ${COUNTRY_COMPARE_API_LOG_LEVEL:-INFO}

      COUNTRY_COMPARE_STORE_BACKEND: ${COUNTRY_COMPARE_STORE_BACKEND:-parquet}
      COUNTRY_COMPARE_STORE_PATH: ${COUNTRY_COMPARE_STORE_PATH:-/app/data/processed/metrics.parquet}
      COUNTRY_COMPARE_METRICS_CONFIG: ${COUNTRY_COMPARE_METRICS_CONFIG:-/app/config/metrics.yaml}
      COUNTRY_COMPARE_SCORING_CONFIG: ${COUNTRY_COMPARE_SCORING_CONFIG:-/app/config/scoring_profiles.yaml}
      COUNTRY_COMPARE_AUDIT_DIR: ${COUNTRY_COMPARE_AUDIT_DIR:-/app/data/audit}
      COUNTRY_COMPARE_EXPORT_DIR: ${COUNTRY_COMPARE_EXPORT_DIR:-/app/data/exports}
      
      COUNTRY_COMPARE_ENABLE_LLM_FORECAST: ${COUNTRY_COMPARE_ENABLE_LLM_FORECAST:-false}
      COUNTRY_COMPARE_LLM_PROVIDER: ${COUNTRY_COMPARE_LLM_PROVIDER:-mistral}
      COUNTRY_COMPARE_LLM_MODEL: ${COUNTRY_COMPARE_LLM_MODEL:-mistral-large-latest}
      COUNTRY_COMPARE_LLM_SERVICE_URL: ${COUNTRY_COMPARE_LLM_SERVICE_URL:-http://llm-forecast:8080}
      COUNTRY_COMPARE_LLM_SERVICE_TOKEN: ${COUNTRY_COMPARE_LLM_SERVICE_TOKEN:-}
      COUNTRY_COMPARE_LLM_SERVICE_TIMEOUT_SECONDS: ${COUNTRY_COMPARE_LLM_SERVICE_TIMEOUT_SECONDS:-25}
      COUNTRY_COMPARE_LLM_MAX_SERIES_PER_REQUEST: ${COUNTRY_COMPARE_LLM_MAX_SERIES_PER_REQUEST:-3}
      COUNTRY_COMPARE_LLM_BASELINE_METHOD: ${COUNTRY_COMPARE_LLM_BASELINE_METHOD:-holt_linear}
      COUNTRY_COMPARE_LLM_MAX_HISTORY_POINTS: ${COUNTRY_COMPARE_LLM_MAX_HISTORY_POINTS:-40}
      COUNTRY_COMPARE_LLM_MAX_ADJUSTMENT_PCT: ${COUNTRY_COMPARE_LLM_MAX_ADJUSTMENT_PCT:-20.0}
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data:ro
    ports:
      - "8000:8000"

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: country-compare-ui:latest
    environment:
      PORT: "8501"

      COUNTRY_COMPARE_API_URL: ${COUNTRY_COMPARE_API_URL:-http://backend:8000}
      COUNTRY_COMPARE_API_KEY: ${COUNTRY_COMPARE_API_KEY:-}
      COUNTRY_COMPARE_API_LOG_LEVEL: ${COUNTRY_COMPARE_API_LOG_LEVEL:-INFO}

      COUNTRY_COMPARE_STORE_BACKEND: ${COUNTRY_COMPARE_STORE_BACKEND:-parquet}
      COUNTRY_COMPARE_STORE_PATH: ${COUNTRY_COMPARE_STORE_PATH:-/app/data/processed/metrics.parquet}
      COUNTRY_COMPARE_METRICS_CONFIG: ${COUNTRY_COMPARE_METRICS_CONFIG:-/app/config/metrics.yaml}
      COUNTRY_COMPARE_SCORING_CONFIG: ${COUNTRY_COMPARE_SCORING_CONFIG:-/app/config/scoring_profiles.yaml}
      COUNTRY_COMPARE_AUDIT_DIR: ${COUNTRY_COMPARE_AUDIT_DIR:-/app/data/audit}
      COUNTRY_COMPARE_EXPORT_DIR: ${COUNTRY_COMPARE_EXPORT_DIR:-/app/data/exports}
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy

  llm-forecast:
    build:
      context: .
      dockerfile: services/llm_forecast_service/Dockerfile
    image: country-compare-llm-forecast:latest
    profiles:
      - llm
    environment:
      PORT: ${LLM_PORT:-8080}
      LLM_SERVICE_TOKEN: ${COUNTRY_COMPARE_LLM_SERVICE_TOKEN:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-mistral}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      MISTRAL_MODEL: ${MISTRAL_MODEL:-mistral-large-latest}

      LLM_DEPLOYMENT_PROFILE: ${LLM_DEPLOYMENT_PROFILE:-local}
      LLM_REQUIRE_ZDR: ${LLM_REQUIRE_ZDR:-false}
      MISTRAL_ZDR_CONFIRMED: ${MISTRAL_ZDR_CONFIRMED:-false}

      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-20}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-0}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-800}

      LLM_MAX_SERIES_PER_REQUEST: ${LLM_MAX_SERIES_PER_REQUEST:-3}
      LLM_MAX_HORIZON_YEARS: ${LLM_MAX_HORIZON_YEARS:-10}
      LLM_MAX_HISTORY_POINTS: ${LLM_MAX_HISTORY_POINTS:-80}
      LLM_MAX_INPUT_CHARS: ${LLM_MAX_INPUT_CHARS:-12000}
      LLM_MAX_ADJUSTMENT_PCT: ${LLM_MAX_ADJUSTMENT_PCT:-15.0}

      LLM_LOG_LEVEL: ${LLM_LOG_LEVEL:-INFO}
      LLM_DEBUG_LOG_PAYLOADS: ${LLM_DEBUG_LOG_PAYLOADS:-false}
    expose:
      - "${LLM_PORT:-8080}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c 'import os, urllib.request; urllib.request.urlopen(\"http://localhost:%s/health\" % os.getenv(\"PORT\", \"8080\"), timeout=2)'",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s     